<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Queryfy</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center">

  <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-lg">

    <h1 class="text-3xl font-bold text-center text-purple-700 mb-6">
      Queryfy✨
    </h1>

    <form id="form" class="space-y-4">

      <div>
        <label class="block text-gray-700 font-semibold">Upload File</label>
        <input type="file" id="file" required
          class="w-full mt-2 p-2 border rounded-lg">
      </div>

      <div>
        <label class="block text-gray-700 font-semibold">Question Type</label>
        <select id="type" class="w-full mt-2 p-2 border rounded-lg">
          <option value="mcq">MCQ</option>
          <option value="short">Short Answer</option>
          <option value="long">Long Answer</option>
        </select>
      </div>

      <div>
        <label class="block text-gray-700 font-semibold">Number of Questions</label>
        <input type="number" id="num" value="5"
          class="w-full mt-2 p-2 border rounded-lg">
      </div>

      <button type="submit"
        class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 rounded-lg transition">
        Generate Questions 🚀
      </button>

    </form>

    <p id="status" class="text-center mt-4 text-gray-600"></p>

  </div>

<script>
document.getElementById("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const file = document.getElementById("file").files[0];
    const type = document.getElementById("type").value;
    const num = document.getElementById("num").value;

    const formData = new FormData();
    formData.append("pdf_file", file);
    formData.append("question_type", type);
    formData.append("num_questions", num);

    document.getElementById("status").innerText = "Generating... ⏳";

    try {
        const response = await fetch("https://queryfy-fvbb.onrender.com/generate", {
            method: "POST",
            body: formData
        });

        const blob = await response.blob();

        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "questions.pdf";
        a.click();

        document.getElementById("status").innerText = "Download ready ✅";
    } catch (err) {
        document.getElementById("status").innerText = "Error ❌";
    }
});
</script>

</body>
</html>
